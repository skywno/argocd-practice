apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-platform-sample
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-control-plane
  source:
    repoURL: https://github.com/example-org/argocd-practice.git
    targetRevision: HEAD
    path: crossplane-argocd-opa/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - ServerSideApply=true
