apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xservices.platform.example.org
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  group: platform.example.org
  names:
    kind: XService
    plural: xservices
  defaultCompositionRef:
    name: xservice.microk8s.platform.example.org
  defaultCompositeDeletePolicy: Foreground
  claimNames:
    kind: Service
    plural: services
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    namespace:
                      type: string
                      minLength: 1
                    image:
                      type: string
                      minLength: 1
                    replicas:
                      type: integer
                      minimum: 1
                      maximum: 5
                  required:
                    - namespace
                    - image
              required:
                - parameters
